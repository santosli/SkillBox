name: Bug report
description: Report a reproducible SkillBox bug.
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for testing SkillBox. Please avoid pasting private skill contents, credentials, or sensitive local paths.
  - type: input
    id: version
    attributes:
      label: SkillBox version
      placeholder: "0.1.1"
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: "14.5"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open SkillBox
        2. Scan workspaces
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Include sanitized logs, screenshots, or sample paths when useful.
