name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  macos-dmg:
    name: Signed macOS DMG
    runs-on: macos-latest

    env:
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install npm dependencies
        run: npm ci

      - name: Fetch Rust dependencies
        run: cargo fetch --locked

      - name: Set release version
        id: release_version
        run: |
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="$(node -e "console.log(JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version)")"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog entry
        id: changelog_entry
        env:
          RELEASE_VERSION: ${{ steps.release_version.outputs.version }}
        run: |
          set -euo pipefail

          awk -v version="$RELEASE_VERSION" '
            $0 == "## " version {
              found = 1
              next
            }
            found && /^## / {
              exit
            }
            found {
              print
            }
          ' CHANGELOG.md > changelog-entry.md

          if ! grep -q '[^[:space:]]' changelog-entry.md; then
            echo "CHANGELOG.md is missing a release entry for ${RELEASE_VERSION}." >&2
            exit 1
          fi

      - name: Import Apple Developer certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          security find-identity -v -p codesigning build.keychain

      - name: Build, sign, and notarize DMG
        uses: tauri-apps/tauri-action@v1.0.0
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          tauriScript: npm run tauri
          includeUpdaterJson: false
          args: --target universal-apple-darwin --bundles app,dmg

      - name: Verify signed DMG
        id: verify_dmg
        env:
          RELEASE_VERSION: ${{ steps.release_version.outputs.version }}
        run: |
          set -euo pipefail

          dmg_list="$(find target -path '*/bundle/dmg/*.dmg' -type f | sort)"
          dmg_count="$(printf '%s\n' "$dmg_list" | sed '/^$/d' | wc -l | tr -d ' ')"
          if [ "$dmg_count" != "1" ]; then
            echo "Expected exactly one DMG artifact, found $dmg_count:" >&2
            printf '%s\n' "$dmg_list" >&2
            exit 1
          fi

          dmg_path="$(printf '%s\n' "$dmg_list" | sed -n '1p')"
          asset_name="SkillBox_${RELEASE_VERSION}_universal.dmg"
          mount_dir="$(mktemp -d)"
          cleanup() {
            hdiutil detach "$mount_dir" || true
            rmdir "$mount_dir" || true
          }
          trap cleanup EXIT

          hdiutil attach "$dmg_path" -nobrowse -readonly -mountpoint "$mount_dir"
          app_path="$mount_dir/SkillBox.app"
          if [ ! -d "$app_path" ]; then
            echo "SkillBox.app was not found in the mounted DMG." >&2
            exit 1
          fi

          codesign --verify --deep --strict --verbose=2 "$app_path"
          spctl -a -vv --type exec "$app_path"

          app_version="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$app_path/Contents/Info.plist")"
          if [ "$app_version" != "$RELEASE_VERSION" ]; then
            echo "Expected app version $RELEASE_VERSION, found $app_version." >&2
            exit 1
          fi

          bundle_id="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "$app_path/Contents/Info.plist")"
          if [ "$bundle_id" != "io.github.santosli.skillbox" ]; then
            echo "Expected bundle id io.github.santosli.skillbox, found $bundle_id." >&2
            exit 1
          fi

          echo "dmg_path=$dmg_path" >> "$GITHUB_OUTPUT"
          echo "asset_name=$asset_name" >> "$GITHUB_OUTPUT"

      - name: Verify updater artifacts
        id: verify_updater
        env:
          RELEASE_VERSION: ${{ steps.release_version.outputs.version }}
        run: |
          set -euo pipefail

          updater_list="$(find target -path '*/bundle/macos/*.app.tar.gz' -type f | sort)"
          updater_count="$(printf '%s\n' "$updater_list" | sed '/^$/d' | wc -l | tr -d ' ')"
          if [ "$updater_count" != "1" ]; then
            echo "Expected exactly one updater archive, found $updater_count:" >&2
            printf '%s\n' "$updater_list" >&2
            exit 1
          fi

          updater_path="$(printf '%s\n' "$updater_list" | sed -n '1p')"
          updater_sig_path="${updater_path}.sig"
          if [ ! -s "$updater_sig_path" ]; then
            echo "Updater signature was not found or is empty: $updater_sig_path" >&2
            exit 1
          fi

          if ! tar -tzf "$updater_path" | grep -q 'SkillBox.app'; then
            echo "Updater archive does not contain SkillBox.app." >&2
            exit 1
          fi

          updater_asset_name="SkillBox_${RELEASE_VERSION}_universal.app.tar.gz"
          updater_sig_asset_name="${updater_asset_name}.sig"
          echo "updater_path=$updater_path" >> "$GITHUB_OUTPUT"
          echo "updater_asset_name=$updater_asset_name" >> "$GITHUB_OUTPUT"
          echo "updater_sig_path=$updater_sig_path" >> "$GITHUB_OUTPUT"
          echo "updater_sig_asset_name=$updater_sig_asset_name" >> "$GITHUB_OUTPUT"

      - name: Write updater JSON
        env:
          RELEASE_VERSION: ${{ steps.release_version.outputs.version }}
          UPDATER_PATH: ${{ steps.verify_updater.outputs.updater_path }}
          UPDATER_SIG_PATH: ${{ steps.verify_updater.outputs.updater_sig_path }}
          UPDATER_ASSET_NAME: ${{ steps.verify_updater.outputs.updater_asset_name }}
        run: |
          set -euo pipefail

          release_tag="v${RELEASE_VERSION}"
          updater_url="https://github.com/santosli/SkillBox/releases/download/${release_tag}/${UPDATER_ASSET_NAME}"
          node scripts/write-updater-json.js \
            --version "$RELEASE_VERSION" \
            --notes-file changelog-entry.md \
            --pub-date "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" \
            --url "$updater_url" \
            --signature-file "$UPDATER_SIG_PATH" \
            --output latest.json
          node -e "const latest = JSON.parse(require('fs').readFileSync('latest.json', 'utf8')); for (const key of ['darwin-aarch64', 'darwin-x86_64']) { if (!latest.platforms[key]?.url || !latest.platforms[key]?.signature) process.exit(1); }"

      - name: Create GitHub release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DMG_PATH: ${{ steps.verify_dmg.outputs.dmg_path }}
          ASSET_NAME: ${{ steps.verify_dmg.outputs.asset_name }}
          UPDATER_PATH: ${{ steps.verify_updater.outputs.updater_path }}
          UPDATER_ASSET_NAME: ${{ steps.verify_updater.outputs.updater_asset_name }}
          UPDATER_SIG_PATH: ${{ steps.verify_updater.outputs.updater_sig_path }}
          UPDATER_SIG_ASSET_NAME: ${{ steps.verify_updater.outputs.updater_sig_asset_name }}
        run: |
          set -euo pipefail
          release_flags=(--verify-tag)
          release_label="Release"
          release_scope="This release publishes the desktop app only. CLI packages, Windows, and Linux builds are not part of this release."
          if [[ "$GITHUB_REF_NAME" == *"-alpha."* ]]; then
            release_flags+=(--prerelease)
            release_label="Public alpha release"
            release_scope="This alpha publishes the desktop app only. CLI packages, Windows, and Linux builds are not part of this release."
          fi

          {
            echo "${release_label} for macOS 14+."
            echo
            echo "Main changes:"
            echo
            cat changelog-entry.md
            echo
            echo "Install options:"
            echo "- Download the signed and notarized universal DMG from this release."
            echo '- Or use Homebrew: `brew tap santosli/tap && brew install --cask skillbox`.'
            echo
            echo "${release_scope}"
          } > release-notes.md
          mkdir -p release-assets
          cp "$DMG_PATH" "release-assets/$ASSET_NAME"
          cp "$UPDATER_PATH" "release-assets/$UPDATER_ASSET_NAME"
          cp "$UPDATER_SIG_PATH" "release-assets/$UPDATER_SIG_ASSET_NAME"
          cp latest.json release-assets/latest.json
          gh release create "$GITHUB_REF_NAME" \
            "release-assets/$ASSET_NAME" \
            "release-assets/$UPDATER_ASSET_NAME" \
            "release-assets/$UPDATER_SIG_ASSET_NAME" \
            "release-assets/latest.json" \
            --title "SkillBox $GITHUB_REF_NAME" \
            --notes-file release-notes.md \
            "${release_flags[@]}"

      - name: Upload checksums
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DMG_PATH: ${{ steps.verify_dmg.outputs.dmg_path }}
          ASSET_NAME: ${{ steps.verify_dmg.outputs.asset_name }}
          UPDATER_PATH: ${{ steps.verify_updater.outputs.updater_path }}
          UPDATER_ASSET_NAME: ${{ steps.verify_updater.outputs.updater_asset_name }}
          UPDATER_SIG_PATH: ${{ steps.verify_updater.outputs.updater_sig_path }}
          UPDATER_SIG_ASSET_NAME: ${{ steps.verify_updater.outputs.updater_sig_asset_name }}
        run: |
          set -euo pipefail
          mkdir -p release-assets
          cp "$DMG_PATH" "release-assets/$ASSET_NAME"
          cp "$UPDATER_PATH" "release-assets/$UPDATER_ASSET_NAME"
          cp "$UPDATER_SIG_PATH" "release-assets/$UPDATER_SIG_ASSET_NAME"
          cp latest.json release-assets/latest.json
          (
            cd release-assets
            shasum -a 256 "$ASSET_NAME" "$UPDATER_ASSET_NAME" "$UPDATER_SIG_ASSET_NAME" latest.json
          ) > SHA256SUMS
          cp SHA256SUMS "${ASSET_NAME}.sha256"
          gh release upload "$GITHUB_REF_NAME" SHA256SUMS "${ASSET_NAME}.sha256" --clobber

      - name: Delete temporary keychain
        if: always()
        run: security delete-keychain build.keychain || true
